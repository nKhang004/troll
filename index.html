<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f5f5f5;
            padding: 20px;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            padding: 16px;
            width: 250px;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: scale(1.02);
        }
        img {
            width: 100%;
            height: auto;
            border-radius: 12px;
        }
        h1 {
            color: #2c3e70;
        }
    </style>
</head>

        </div>

</body>
</html>
